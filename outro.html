<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Walking Tour Outro</title>
<style>
html, body{
  margin:0;
  width:100%;
  height:100%;
  background:transparent;
  overflow:hidden;
}

body{
  font-family:Arial, Helvetica, sans-serif;
}

/* dark cinematic background */
.bg{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.78);
  opacity:0;
  animation:bgFade 1.2s ease forwards;
}

/* centered image */
.wrap{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  animation:mainFade 1.5s ease forwards;
}

.wrap img{
  width:min(92vw, 1200px);
  height:auto;
  display:block;
}

@keyframes mainFade{
  from{
    opacity:0;
    transform:translateY(10px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

@keyframes bgFade{
  from{opacity:0;}
  to{opacity:1;}
}
</style>
</head>
<body>
  <div class="bg"></div>

  <div class="wrap">
    <img src="./outro.png?v=2" alt="Walking Tour Outro">
  </div>
</body>
</html>
